<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto</title>
  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center mb-4">Formulario de Contacto</h1>
    
    <!-- Alerta de error oculta -->
    <div id="alertError" class="alert alert-danger d-none" role="alert">
       Por favor completa todos los campos correctamente antes de enviar.
    </div>

    <!-- Formulario centrado y más pequeño -->
    <form id="miFormulario" class="mx-auto" style="max-width: 400px;" novalidate>
      <!-- Nombre -->
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control form-control-sm" id="nombre" placeholder="Ingresa tu nombre" required>
      </div>

      <!-- Correo -->
      <div class="mb-3">
        <label for="correo" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control form-control-sm" id="correo" placeholder="nombre@ejemplo.com" required>
      </div>

      <!-- Teléfono -->
      <div class="mb-3">
        <label for="telefono" class="form-label">Teléfono</label>
        <input type="tel" class="form-control form-control-sm" id="telefono" placeholder="Ingresa tu número de teléfono" required>
      </div>

      <!-- Comentarios -->
      <div class="mb-3">
        <label for="comentarios" class="form-label">Comentarios</label>
        <textarea class="form-control form-control-sm" id="comentarios" rows="2" placeholder="Escribe tu mensaje..." required></textarea>
      </div>

      <!-- Checkbox -->
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="terminos" required>
        <label class="form-check-label" for="terminos">Acepto términos y condiciones</label>
      </div>

      <!-- Botón -->
      <div class="text-center">
        <button type="submit" class="btn btn-primary btn-sm">Enviar</button>
      </div>
    </form>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Validación con JavaScript -->
  <script src="validacionForm.js"></script>
</body>
</html>
